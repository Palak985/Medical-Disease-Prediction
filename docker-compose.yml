version: '3.8'

services:
  api:
    build: .
    container_name: medical-prediction-api
    ports:
      - "8000:8000"
    volumes:
      - ./dataset:/app/dataset:ro
      - ./models:/app/models:ro
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - medical_network

  # Optional: Streamlit app service
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: medical-prediction-ui
    ports:
      - "8501:8501"
    volumes:
      - ./dataset:/app/dataset:ro
      - ./models:/app/models:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    networks:
      - medical_network
    depends_on:
      - api

networks:
  medical_network:
    driver: bridge

volumes:
  dataset:
  models: